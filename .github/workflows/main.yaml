name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código (App)
        uses: actions/checkout@v4

      # 1. ETAPA DE TESTES
      - name: Instalar Node.js e PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Instalar dependências
        run: pnpm install

      - name: Rodar Testes
        run: pnpm test

      # 2. LOGIN SEGURO
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. BUILD E PUSH
      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Corrigi aqui para incluir o nome da imagem antes da tag
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gymtracker-api:${{ github.sha }}

      # 4. ATUALIZAÇÃO DO REPO DE INFRA
      - name: Checkout do repo de Infra
        uses: actions/checkout@v4
        with:
          # Substitua pelo seu usuário e nome do repo de infraestrutura
          repository: bryan-fm/gymtracker-infra 
          # O PAT_TOKEN que você criou nas configurações do GitHub
          token: ${{ secrets.PAT_TOKEN }}
          # Salva o repo de infra em uma pasta separada para não misturar com o código da App
          path: infra-repo

      - name: Atualizar Manifesto K8s no outro repo
        env:
          # Injetamos o Segredo do GitHub como variável de ambiente para o envsubst
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          cd infra-repo
          
          # 1. Atualizamos a imagem usando sed (como você já fazia)
          sed -i "s|image: .*|image: ${DOCKER_USER}/gymtracker-api:${IMAGE_TAG}|g" apps/backend/deployment.yaml
          
          # 2. SEGURO: Usamos envsubst para trocar o placeholder ${DATABASE_URL} no arquivo
          # Isso permite que você tenha env: - name: DATABASE_URL value: "${DATABASE_URL}" no YAML
          envsubst < apps/backend/deployment.yaml > deployment.tmp
          mv deployment.tmp apps/backend/deployment.yaml
          
          # 3. Commit e Push
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add apps/backend/deployment.yaml
          git commit -m "chore: update gymtracker-api image and envs to ${IMAGE_TAG}"
          git push
