name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # 1. ETAPA DE TESTES (Garante que o index.html não quebre)
      - name: Instalar Node.js e PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Instalar dependências
        run: pnpm install

      - name: Rodar Testes
        run: pnpm test # O build só continua se os testes passarem

      # 2. LOGIN SEGURO (Usando Secrets)
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. BUILD E PUSH
      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gymtracker-api:${{ github.sha }}

      # 4. ATUALIZAÇÃO DO YAML (O segredo do ArgoCD)
      - name: Atualizar Manifesto K8s
        run: |
          # Substitui a imagem antiga pela nova com o hash do commit atual
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/gymtracker-api:${{ github.sha }}|g" k8s/deployment.yaml
          
          # Comita a mudança de volta para o repositório
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push
